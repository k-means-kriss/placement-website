<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – PlaceMe</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🎓 PlaceMe</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to access your dashboard and applications</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
          <div style="text-align:right;margin-top:.3rem">
            <a href="#" style="font-size:.82rem">Forgot password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">
          Log In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

      <div style="text-align:center;margin-top:1.25rem">
        <a href="index.html" style="font-size:.83rem;color:var(--text-muted)">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
